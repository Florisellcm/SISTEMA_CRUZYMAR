<div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <h2 style="margin:0;font-size:20px;font-weight:800;color:#003C78">🚛 Proveedores</h2>
      <p style="margin-top:4px;color:#64748B;font-size:13px">Gestión de proveedores de leche y materiales</p>
    </div>
    <button onclick="openNuevoProveedor()"
      style="background:#003C78;color:#fff;padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">
      + Nuevo Proveedor
    </button>
  </div>

  <div style="display:flex;gap:12px;margin-bottom:16px">
    <input id="buscarProveedor" oninput="filtrarProveedores()"
      placeholder="🔍 Buscar proveedor..."
      style="padding:9px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;width:260px">
  </div>

  <div style="background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2;overflow:auto">
    <table style="width:100%;border-collapse:collapse;min-width:650px">
      <thead>
        <tr style="background:#F4F7FA">
          <th style="padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Nombre</th>
          <th style="padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Tipo</th>
          <th style="padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Teléfono</th>
          <th style="padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Email</th>
          <th style="padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Dirección</th>
          <th style="padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Acciones</th>
        </tr>
      </thead>
      <tbody id="proveedoresTableBody">
        <tr><td colspan="6" style="text-align:center;padding:40px;color:#64748B">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- MODAL PROVEEDOR -->
<div id="modalProveedor" style="display:none;position:fixed;inset:0;background:rgba(15,35,73,.55);align-items:center;justify-content:center;z-index:1000;padding:20px">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,.25)">

    <div style="padding:20px 24px;border-bottom:1px solid #E0E9F2;display:flex;justify-content:space-between;align-items:center">
      <h3 id="modalProveedorTitulo" style="font-size:16px;font-weight:700;color:#003C78;margin:0">Nuevo Proveedor</h3>
      <button onclick="closeModalProveedor()" style="width:30px;height:30px;border-radius:8px;border:none;background:#F4F7FA;cursor:pointer;font-size:16px">✕</button>
    </div>

    <div style="padding:24px">
      <form id="formProveedor">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

          <div style="grid-column:span 2">
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">Nombre *</label>
            <input id="provNombre" type="text" placeholder="Nombre del proveedor"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
          </div>

          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">Tipo</label>
            <select id="provTipo" style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
              <option value="Local">Local</option>
              <option value="Regional">Regional</option>
              <option value="Internacional">Internacional</option>
            </select>
          </div>

          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">Teléfono</label>
            <input id="provTelefono" type="text" placeholder="0000-0000"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
          </div>

          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">Email</label>
            <input id="provEmail" type="email" placeholder="correo@proveedor.com"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
          </div>

          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">RTN</label>
            <input id="provRtn" type="text" placeholder="RTN (opcional)"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
          </div>

          <div style="grid-column:span 2">
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">Dirección</label>
            <input id="provDireccion" type="text" placeholder="Dirección del proveedor"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
          </div>

        </div>
      </form>
    </div>

    <div style="padding:16px 24px;border-top:1px solid #E0E9F2;display:flex;justify-content:flex-end;gap:10px">
      <button onclick="closeModalProveedor()"
        style="padding:10px 20px;border:2px solid #E0E9F2;background:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#64748B">
        Cancelar
      </button>
      <button onclick="saveProveedor()"
        style="padding:10px 20px;background:#003C78;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">
        💾 Guardar
      </button>
    </div>

  </div>
</div>

<style>
  .btn-accion { width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .2s; }
  .btn-accion.azul { background:#EAF2FB;color:#0A4A8F; }
  .btn-accion.rojo { background:#FEF2F2;color:#991B1B; }
  .btn-accion:hover { opacity:.75;transform:scale(1.1); }
  tbody tr { border-bottom:1px solid #F0F4F8; }
  tbody tr:hover { background:#F8FBFF; }
  tbody td { padding:12px 16px;font-size:13px; }
</style>
