
  <!-- HEADER -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <h2 style="margin:0;font-size:20px;font-weight:800;color:#003C78">
        <i class="ri-bank-card-line" style="color:#0A4A8F"></i> Gastos
      </h2>
      <p style="margin-top:4px;color:#64748B;font-size:13px">Control de egresos y gastos operativos</p>
    </div>
    <button onclick="openNuevoGasto()"
      style="background:#003C78;color:#fff;padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="ri-add-line"></i> Nuevo Gasto
    </button>
  </div>

  <!-- TARJETAS -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#FEF2F2;display:flex;align-items:center;justify-content:center">
          <i class="ri-money-dollar-circle-line" style="color:#DC2626;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Total Gastos</span>
      </div>
      <div id="gsTotalGeneral" style="font-size:24px;font-weight:800;color:#DC2626">L. 0.00</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">todos los registros</div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#FFF7ED;display:flex;align-items:center;justify-content:center">
          <i class="ri-drop-line" style="color:#EA580C;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Materia Prima</span>
      </div>
      <div id="gsMateriaPrima" style="font-size:24px;font-weight:800;color:#EA580C">L. 0.00</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">leche e insumos</div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#F5F3FF;display:flex;align-items:center;justify-content:center">
          <i class="ri-service-line" style="color:#7C3AED;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Servicios</span>
      </div>
      <div id="gsServicios" style="font-size:24px;font-weight:800;color:#7C3AED">L. 0.00</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">agua, luz, teléfono</div>
    </div>
  </div>

  <!-- FILTRO -->
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <select id="filtroCategoria" onchange="filtrarGastos()"
      style="padding:9px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;cursor:pointer">
      <option value="">Todas las categorías</option>
      <option value="Materia Prima">Materia Prima</option>
      <option value="Servicios">Servicios</option>
      <option value="Personal">Personal</option>
      <option value="Mantenimiento">Mantenimiento</option>
      <option value="Transporte">Transporte</option>
      <option value="Otros">Otros</option>
    </select>
  </div>

  <!-- TABLA -->
  <div style="background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2;overflow:auto">
    <div style="padding:16px 20px;border-bottom:1px solid #E0E9F2">
      <span style="font-size:13px;font-weight:700;color:#003C78">
        <i class="ri-list-check-2"></i> Registro de Gastos
      </span>
    </div>
    <table style="width:100%;border-collapse:collapse;min-width:650px">
      <thead>
        <tr style="background:#F4F7FA">
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Concepto</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Categoría</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Monto</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Proveedor</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Comprobante</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Fecha</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Acciones</th>
        </tr>
      </thead>
      <tbody id="gastosTableBody">
        <tr><td colspan="7" style="text-align:center;padding:50px;color:#64748B">
          <i class="ri-bank-card-line" style="font-size:36px;display:block;margin-bottom:10px;opacity:.3"></i>
          Cargando gastos...
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div id="modalGasto" style="display:none;position:fixed;inset:0;background:rgba(15,35,73,.55);align-items:center;justify-content:center;z-index:1000;padding:20px">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto">
    <div style="padding:20px 24px;border-bottom:1px solid #E0E9F2;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:10px;background:#FEF2F2;display:flex;align-items:center;justify-content:center">
          <i class="ri-bank-card-line" style="color:#DC2626;font-size:18px"></i>
        </div>
        <h3 id="modalGastoTitulo" style="font-size:16px;font-weight:700;color:#003C78;margin:0">Nuevo Gasto</h3>
      </div>
      <button onclick="closeModalGasto()" style="width:30px;height:30px;border-radius:8px;border:none;background:#F4F7FA;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748B">
        <i class="ri-close-line"></i>
      </button>
    </div>
    <div style="padding:24px">
      <form id="formGasto">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div style="grid-column:span 2">
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-file-text-line"></i> Concepto *</label>
            <input id="gsConcepto" type="text" placeholder="Descripción del gasto"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-price-tag-3-line"></i> Categoría</label>
            <select id="gsCategoria" style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
              <option value="Materia Prima">Materia Prima</option>
              <option value="Servicios">Servicios</option>
              <option value="Personal">Personal</option>
              <option value="Mantenimiento">Mantenimiento</option>
              <option value="Transporte">Transporte</option>
              <option value="Otros">Otros</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-money-dollar-circle-line"></i> Monto (L.) *</label>
            <input id="gsMonto" type="number" min="0" step="0.01" placeholder="0.00"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-truck-line"></i> Proveedor</label>
            <input id="gsProveedor" type="text" placeholder="A quién se pagó"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-calendar-line"></i> Fecha</label>
            <input id="gsFecha" type="date"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div style="grid-column:span 2">
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-file-list-3-line"></i> N° Comprobante</label>
            <input id="gsComprobante" type="text" placeholder="FAC-001, REC-002..."
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
        </div>
      </form>
    </div>
    <div style="padding:16px 24px;border-top:1px solid #E0E9F2;display:flex;justify-content:flex-end;gap:10px">
      <button onclick="closeModalGasto()" style="padding:10px 20px;border:2px solid #E0E9F2;background:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#64748B;display:flex;align-items:center;gap:6px">
        <i class="ri-close-line"></i> Cancelar
      </button>
      <button onclick="saveGasto()" style="padding:10px 24px;background:#003C78;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
        <i class="ri-save-line"></i> Guardar
      </button>
    </div>
  </div>
</div>

<style>
  .btn-accion{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;}
  .btn-accion.azul{background:#EAF2FB;color:#0A4A8F;}.btn-accion.rojo{background:#FEF2F2;color:#991B1B;}
  .btn-accion:hover{opacity:.75;transform:scale(1.1);}
  #gastosTableBody tr{border-bottom:1px solid #F0F4F8;}
  #gastosTableBody tr:hover{background:#F8FBFF;}
  #gastosTableBody td{padding:12px 16px;font-size:13px;}
</style>
