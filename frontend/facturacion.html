<div>
  <!-- ── HEADER ── -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <h2 style="margin:0;font-size:20px;font-weight:800;color:#003C78">
        <i class="ri-file-list-3-line" style="color:#0A4A8F"></i> Facturación Electrónica
      </h2>
      <p style="margin-top:4px;color:#64748B;font-size:13px">Gestión de facturas y documentos fiscales</p>
    </div>
    <button onclick="openNuevaFactura()"
      style="background:#003C78;color:#fff;padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="ri-add-line"></i> Emitir Factura
    </button>
  </div>

  <!-- ── TARJETAS RESUMEN ── -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">
    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#EAF2FB;display:flex;align-items:center;justify-content:center">
          <i class="ri-file-text-line" style="color:#003C78;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Facturas Emitidas</span>
      </div>
      <div id="facTotal" style="font-size:24px;font-weight:800;color:#003C78">0</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">del mes actual</div>
    </div>

    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#F0FDF4;display:flex;align-items:center;justify-content:center">
          <i class="ri-money-dollar-circle-line" style="color:#16A34A;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Monto Total</span>
      </div>
      <div id="facMonto" style="font-size:24px;font-weight:800;color:#16A34A">L. 0.00</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">ingreso facturado</div>
    </div>
  </div>

  <!-- ── TABLA REGISTROS ── -->
  <div style="background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2;overflow:auto">
    <div style="padding:16px 20px;border-bottom:1px solid #E0E9F2;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:700;color:#003C78">
        <i class="ri-list-check-2"></i> Listado de Facturas
      </span>
    </div>
    <table style="width:100%;border-collapse:collapse;min-width:900px">
      <thead>
        <tr style="background:#F4F7FA">
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Número CAI</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Cliente / RTN</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Monto (L.)</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Fecha</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Acciones</th>
        </tr>
      </thead>
      <tbody id="facturacionTableBody">
        <tr><td colspan="5" style="text-align:center;padding:40px;color:#64748B">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MODAL NUEVA FACTURA
══════════════════════════════════════════ -->
<div id="modalFacturacion" style="display:none;position:fixed;inset:0;background:rgba(15,35,73,.55);align-items:center;justify-content:center;z-index:1000;padding:20px">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:500px;box-shadow:0 32px 80px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto">
    <div style="padding:20px 24px;border-bottom:1px solid #E0E9F2;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:16px 16px 0 0">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:10px;background:#EAF2FB;display:flex;align-items:center;justify-content:center">
          <i class="ri-file-list-3-line" style="color:#003C78;font-size:18px"></i>
        </div>
        <h3 style="font-size:16px;font-weight:700;color:#003C78;margin:0">Emitir Factura</h3>
      </div>
      <button onclick="closeModalFacturacion()" style="width:30px;height:30px;border-radius:8px;border:none;background:#F4F7FA;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#64748B">
        <i class="ri-close-line"></i>
      </button>
    </div>
    <div style="padding:24px">
      <form id="formFacturacion">
        <div style="display:grid;grid-template-columns:1fr;gap:14px">
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">Cliente / Razón Social</label>
            <input id="facCliente" type="text" placeholder="Nombre completo"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">RTN</label>
            <input id="facRtn" type="text" placeholder="RTN del cliente"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase">Monto Total a Facturar (L.)</label>
            <input id="facMontoInput" type="number" step="0.01" placeholder="0.00"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
        </div>
      </form>
    </div>
    <div style="padding:16px 24px;border-top:1px solid #E0E9F2;display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff;border-radius:0 0 16px 16px">
      <button onclick="closeModalFacturacion()" style="padding:10px 20px;border:2px solid #E0E9F2;background:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#64748B;display:flex;align-items:center;gap:6px">
        <i class="ri-close-line"></i> Cancelar
      </button>
      <button onclick="saveFacturacion()" style="padding:10px 24px;background:#003C78;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
        <i class="ri-check-line"></i> Emitir
      </button>
    </div>
  </div>
</div>

<style>
  .btn-accion { width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .2s; }
  .btn-accion.rojo { background:#FEF2F2;color:#991B1B; }
  .btn-accion:hover { opacity:.75;transform:scale(1.1); }
  #facturacionTableBody tr { border-bottom:1px solid #F0F4F8; }
  #facturacionTableBody tr:hover { background:#F8FBFF; }
  #facturacionTableBody td { padding:12px 16px;font-size:13px; }
</style>
