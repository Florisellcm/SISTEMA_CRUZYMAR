
  <!-- HEADER -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <h2 style="margin:0;font-size:20px;font-weight:800;color:#003C78">
        <i class="ri-group-line" style="color:#0A4A8F"></i> Clientes
      </h2>
      <p style="margin-top:4px;color:#64748B;font-size:13px">Gestión de clientes y compradores</p>
    </div>
    <button onclick="openNuevoCliente()"
      style="background:#003C78;color:#fff;padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="ri-add-line"></i> Nuevo Cliente
    </button>
  </div>

  <!-- TARJETAS RESUMEN -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#EAF2FB;display:flex;align-items:center;justify-content:center">
          <i class="ri-group-line" style="color:#003C78;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Total Clientes</span>
      </div>
      <div id="cliTotal" style="font-size:24px;font-weight:800;color:#003C78">0</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">registrados en el sistema</div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#F0FDF4;display:flex;align-items:center;justify-content:center">
          <i class="ri-building-2-line" style="color:#16A34A;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Empresas</span>
      </div>
      <div id="cliEmpresas" style="font-size:24px;font-weight:800;color:#16A34A">0</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">supermercados y negocios</div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:#FFF7ED;display:flex;align-items:center;justify-content:center">
          <i class="ri-user-line" style="color:#EA580C;font-size:18px"></i>
        </div>
        <span style="font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase">Particulares</span>
      </div>
      <div id="cliParticulares" style="font-size:24px;font-weight:800;color:#EA580C">0</div>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px">clientes individuales</div>
    </div>
  </div>

  <!-- BUSCAR -->
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <div style="position:relative;flex:1;max-width:320px">
      <i class="ri-search-line" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:15px"></i>
      <input id="buscarCliente" type="text" placeholder="Buscar cliente..." oninput="filtrarClientes()"
        style="width:100%;padding:9px 14px 9px 36px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
    </div>
  </div>

  <!-- TABLA -->
  <div style="background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,60,120,.06);border:1px solid #E0E9F2;overflow:auto">
    <div style="padding:16px 20px;border-bottom:1px solid #E0E9F2">
      <span style="font-size:13px;font-weight:700;color:#003C78">
        <i class="ri-list-check-2"></i> Lista de Clientes
      </span>
    </div>
    <table style="width:100%;border-collapse:collapse;min-width:700px">
      <thead>
        <tr style="background:#F4F7FA">
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Nombre</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Tipo</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Teléfono</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Email</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Dirección</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase">Acciones</th>
        </tr>
      </thead>
      <tbody id="clientesTableBody">
        <tr><td colspan="6" style="text-align:center;padding:50px;color:#64748B">
          <i class="ri-group-line" style="font-size:36px;display:block;margin-bottom:10px;opacity:.3"></i>
          Cargando clientes...
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div id="modalCliente" style="display:none;position:fixed;inset:0;background:rgba(15,35,73,.55);align-items:center;justify-content:center;z-index:1000;padding:20px">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:500px;box-shadow:0 32px 80px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto">
    <div style="padding:20px 24px;border-bottom:1px solid #E0E9F2;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:10px;background:#EAF2FB;display:flex;align-items:center;justify-content:center">
          <i class="ri-group-line" style="color:#003C78;font-size:18px"></i>
        </div>
        <h3 id="modalClienteTitulo" style="font-size:16px;font-weight:700;color:#003C78;margin:0">Nuevo Cliente</h3>
      </div>
      <button onclick="closeModalCliente()" style="width:30px;height:30px;border-radius:8px;border:none;background:#F4F7FA;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748B">
        <i class="ri-close-line"></i>
      </button>
    </div>
    <div style="padding:24px">
      <form id="formCliente">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div style="grid-column:span 2">
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-user-line"></i> Nombre *</label>
            <input id="cliNombre" type="text" placeholder="Nombre completo o empresa"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-price-tag-3-line"></i> Tipo</label>
            <select id="cliTipo" style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none">
              <option value="Particular">Particular</option>
              <option value="Empresa">Empresa</option>
              <option value="Pulpería">Pulpería</option>
              <option value="Supermercado">Supermercado</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-phone-line"></i> Teléfono</label>
            <input id="cliTelefono" type="text" placeholder="0000-0000"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-mail-line"></i> Email</label>
            <input id="cliEmail" type="email" placeholder="correo@ejemplo.com"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-file-list-line"></i> RTN</label>
            <input id="cliRtn" type="text" placeholder="RTN (opcional)"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
          <div style="grid-column:span 2">
            <label style="display:block;font-size:12px;font-weight:700;color:#1e2d42;margin-bottom:6px;text-transform:uppercase"><i class="ri-map-pin-line"></i> Dirección</label>
            <input id="cliDireccion" type="text" placeholder="Dirección del cliente"
              style="width:100%;padding:10px 14px;border:2px solid #E0E9F2;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box">
          </div>
        </div>
      </form>
    </div>
    <div style="padding:16px 24px;border-top:1px solid #E0E9F2;display:flex;justify-content:flex-end;gap:10px">
      <button onclick="closeModalCliente()" style="padding:10px 20px;border:2px solid #E0E9F2;background:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#64748B;display:flex;align-items:center;gap:6px">
        <i class="ri-close-line"></i> Cancelar
      </button>
      <button onclick="saveCliente()" style="padding:10px 24px;background:#003C78;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
        <i class="ri-save-line"></i> Guardar
      </button>
    </div>
  </div>
</div>

<style>
  .btn-accion{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;}
  .btn-accion.azul{background:#EAF2FB;color:#0A4A8F;}.btn-accion.rojo{background:#FEF2F2;color:#991B1B;}
  .btn-accion:hover{opacity:.75;transform:scale(1.1);}
  #clientesTableBody tr{border-bottom:1px solid #F0F4F8;}
  #clientesTableBody tr:hover{background:#F8FBFF;}
  #clientesTableBody td{padding:12px 16px;font-size:13px;}
</style>
